name: Build and Push Docker Images

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

jobs:
  prepare-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    environment: ${{ github.event.inputs.environment || 'dev' }}
    outputs:
      version: ${{ steps.meta.outputs.version }}
      labels: ${{ steps.meta.outputs.labels }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-builder
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-worker
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-realtime
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

  build-builder-image:
    runs-on: ubuntu-latest
    needs: prepare-metadata
    permissions:
      contents: read
      packages: write
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env file from secrets
        uses: 0ndt/envfile@v2
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push builder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/builder/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-builder:${{ needs.prepare-metadata.outputs.version }}
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-builder:latest
          labels: ${{ needs.prepare-metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64 #,linux/arm64

  build-worker-image:
    runs-on: ubuntu-latest
    needs: prepare-metadata
    permissions:
      contents: read
      packages: write
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env file from secrets
        uses: 0ndt/envfile@v2
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/worker/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-worker:${{ needs.prepare-metadata.outputs.version }}
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-worker:latest
          labels: ${{ needs.prepare-metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64 #,linux/arm64

  build-realtime-image:
    runs-on: ubuntu-latest
    needs: prepare-metadata
    permissions:
      contents: read
      packages: write
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Create .env file from secrets
        uses: 0ndt/envfile@v2
        with:
          secrets: ${{ toJSON(secrets) }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.DOCKER_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push realtime image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/partysocket/docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-realtime:${{ needs.prepare-metadata.outputs.version }}
            ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-realtime:latest
          labels: ${{ needs.prepare-metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64 #,linux/arm64

  output-image-urls:
    runs-on: ubuntu-latest
    needs:
      - prepare-metadata
      - build-builder-image
      - build-worker-image
      - build-realtime-image
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - name: Output image URLs
        run: |
          echo "Builder image: ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-builder:${{ needs.prepare-metadata.outputs.version }}"
          echo "Worker image: ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-worker:${{ needs.prepare-metadata.outputs.version }}"
          echo "Realtime image: ${{ vars.DOCKER_REGISTRY }}/${{ vars.DOCKER_IMAGE_PREFIX }}/chatbotx-realtime:${{ needs.prepare-metadata.outputs.version }}"
