name: chatbotx

include:
  - packages/kafka/docker-compose.yml

x-network: &network
  networks:
    - chatbotx-network

x-minio-creds: &minio-creds
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-chatbotx}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-nr541Kv59xB4f48bhZOy5wBz}

services:
  postgres:
    <<: *network
    image: timescale/timescaledb:latest-pg17
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "log_statement=${POSTGRES_LOG_STATEMENT:-none}"]
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-chatbotx}
      - POSTGRES_USER=${POSTGRES_USER:-chatbotx}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nr541Kv59xB4f48bhZOy5wBz}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  pgadmin:
    <<: *network
    image: dpage/pgadmin4:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@example.com
      - PGADMIN_DEFAULT_PASSWORD=nr541Kv59xB4f48bhZOy5wBz

  mailhog:
    <<: *network
    image: mailhog/mailhog
    ports:
      - 1025:1025
      - 8025:8025

  minio:
    <<: *network
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment: *minio-creds
    volumes:
      - s3-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 5s

  createbuckets:
    <<: *network
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      /bin/sh -c "
      set -e;
      /usr/bin/mc alias set minio http://minio:9000 ${MINIO_ROOT_USER:-chatbotx} ${MINIO_ROOT_PASSWORD:-nr541Kv59xB4f48bhZOy5wBz};
      /usr/bin/mc mb --ignore-existing minio/chatbotx;
      /usr/bin/mc mb --ignore-existing minio/chatbotx/public;
      /usr/bin/mc anonymous set public minio/chatbotx/public;
      exit 0;
      "

  redis:
    <<: *network
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - cache-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  clickhouse:
    <<: *network
    image: clickhouse/clickhouse-server:26.2-alpine
    ports:
      - "8124:8123"
      - "9081:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-backups:/var/backups/clickhouse
    environment:
      - CLICKHOUSE_DB=${CLICKHOUSE_DB:-chatbotx_analytics}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-chatbotx}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-nr541Kv59xB4f48bhZOy5wBz}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

networks:
  chatbotx-network:
    driver: bridge

volumes:
  db-data:
  s3-data:
  cache-data:
  clickhouse-data:
  clickhouse-backups:
