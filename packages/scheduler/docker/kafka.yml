services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper-scheduler
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
      - KAFKA_ADMIN_PASSWORD=${KAFKA_ADMIN_PASSWORD}
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/zookeeper_jaas.conf
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
      - ./config/zookeeper_jaas.conf.template:/etc/kafka/zookeeper_jaas.conf.template:ro
      - ./scripts/zookeeper-entrypoint.sh:/zookeeper-entrypoint.sh:ro
    entrypoint: ["/zookeeper-entrypoint.sh"]
    networks:
      - scheduler-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka-scheduler
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_EXTERNAL_PORT:-9092}:9092"
      - "${KAFKA_INTERNAL_PORT:-9093}:9093"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=EXTERNAL://0.0.0.0:9092,INTERNAL://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=EXTERNAL://${KAFKA_EXTERNAL_HOST:-localhost}:${KAFKA_EXTERNAL_PORT:-9092},INTERNAL://kafka:9093
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=EXTERNAL:SASL_PLAINTEXT,INTERNAL:SASL_PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=INTERNAL
      - KAFKA_SASL_ENABLED_MECHANISMS=PLAIN
      - KAFKA_SASL_MECHANISM_INTER_BROKER_PROTOCOL=PLAIN
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_NUM_PARTITIONS=${KAFKA_NUM_PARTITIONS:-16}
      - KAFKA_ADMIN_PASSWORD=${KAFKA_ADMIN_PASSWORD}
      - KAFKA_OPTS=-Djava.security.auth.login.config=/etc/kafka/kafka_server_jaas.conf
    volumes:
      - kafka_data:/var/lib/kafka/data
      - ./config/kafka_server_jaas.conf.template:/etc/kafka/kafka_server_jaas.conf.template:ro
      - ./scripts/kafka-entrypoint.sh:/kafka-entrypoint.sh:ro
    entrypoint: ["/kafka-entrypoint.sh"]
    networks:
      - scheduler-network
    restart: unless-stopped

volumes:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  scheduler-network:
    driver: bridge
