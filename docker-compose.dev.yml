name: chatbotx

include:
  - docker-compose.yml

services:
  builder:
    build:
      context: .
      dockerfile: apps/builder/docker/Dockerfile
    # image: realcodesiman/chatbotx-builder:latest
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - ./.env.dev
    environment:
      - HOSTNAME=0.0.0.0
    ports:
      - "3123:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    extra_hosts:
      - "host.docker.internal:host-gateway"
    labels:
      virtual.host: "virtual-builder.example.com"
      virtual.port: "3000"
      virtual.tls-email: "admin@example.com"

  # BullMQ Worker
  worker:
    build:
      context: .
      dockerfile: apps/worker/docker/Dockerfile
    # image: realcodesiman/chatbotx-worker:latest
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - ./.env.dev
    extra_hosts:
      - "host.docker.internal:host-gateway"

  realtime:
    # build:
    #   context: .
    #   dockerfile: apps/partysocket/docker/Dockerfile
    image: realcodesiman/chatbotx-partysocket:latest
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "1999:1999"
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  chatbotx-network:
    driver: bridge
